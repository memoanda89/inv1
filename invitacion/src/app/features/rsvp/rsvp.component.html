
<section class="rsvp-s" appReveal>
  <div class="rsvp-ttl">Confirmación de Asistencia</div>
  <p class="rsvp-sub">Por favor confirma antes del {{cfg.config.rsvpDeadline}}</p>
  @if (!state.rsvp()) {
    <div class="rsvp-btns">
      <button class="rb rb-yes" (click)="confirm(true)">✓&nbsp; Asistiré con gusto</button>
      <button class="rb rb-no"  (click)="confirm(false)">✗&nbsp; No podré asistir</button>
    </div>
  } @else {
    <div class="rsvp-resp">
      <div class="resp-ico">{{state.rsvp() === "yes" ? "🥂" : "🙏"}}</div>
      <p class="resp-msg">{{state.rsvp() === "yes" ? "¡Gracias! Te esperamos con los brazos abiertos 💍" : "Lo entendemos, gracias por avisarnos."}}</p>
    </div>
  }
</section>
