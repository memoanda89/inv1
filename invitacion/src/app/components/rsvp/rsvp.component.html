<section class="rsvp-s">
  <div class="rsvp-ttl">Confirmación de Asistencia</div>
  <p class="rsvp-sub">Por favor confirma antes del {{ wedding.rsvpDeadline }}</p>

  @if (!responded()) {
    <div class="rsvp-btns">
      <button class="rb yes" (click)="confirm(true)">
        <span>✓ &nbsp;Asistiré con gusto</span>
      </button>
      <button class="rb no" (click)="confirm(false)">
        <span>✗ &nbsp;No podré asistir</span>
      </button>
    </div>
  } @else {
    <div class="rsvp-resp">
      <div class="resp-ico">{{ accepted() ? '🥂' : '🙏' }}</div>
      <p class="resp-msg">
        {{ accepted()
          ? ' ¡Gracias! Te esperamos con los brazos abiertos 💍'
          : 'Lo entendemos, gracias por avisarnos.' }}
      </p>
    </div>
  }
</section>
