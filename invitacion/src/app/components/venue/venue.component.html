<section class="venue-s">
  @if (showBadge) {
    <div class="confetti-badge">✦ ¡Aquí nos casamos! ✦</div>
  }
  <div class="sec-title">Dónde Celebramos</div>

  <div class="map-card">
    <iframe class="map-frame"
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3727.22!2d-100.7430!3d20.9145!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x842b54a4cc80a7e9%3A0x5a1b4e2f3e1a9d2!2sSan%20Miguel%20de%20Allende%2C%20Gto.!5e0!3m2!1ses!2smx!4v1700000000000!5m2!1ses!2smx"
      allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    <div class="map-overlay"></div>
    <div class="map-pin-badge">
      <div class="mpb-name">{{ wedding.venue }}</div>
      <div class="mpb-addr">{{ wedding.city }}</div>
    </div>
  </div>

  <div class="map-actions">
    <a class="map-btn"
       href="https://maps.google.com/?q=San+Miguel+de+Allende+Guanajuato+Mexico"
       target="_blank">🗺️ Abrir en Google Maps</a>
    <a class="map-btn"
       href="https://maps.apple.com/?q=San+Miguel+de+Allende"
       target="_blank">🧭 Abrir en Apple Maps</a>
    <button class="map-btn" (click)="copy()">
      📋 {{ copied ? '¡Copiada! ✓' : 'Copiar dirección' }}
    </button>
  </div>
</section>
