  <button class="mfab-btn" [class.playing]="playing()" (click)="toggle()">
    @if (playing()) {
      <div class="mfab-eq"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
    } @else {
      <span class="mfab-play">▶</span>
    }
    @if (!playing()) { <div class="mfab-badge">♪</div> }
  </button>
</div>
